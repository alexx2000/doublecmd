name: build-release

on:
  workflow_dispatch:

concurrency:
  group: ${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-lin:
    runs-on: ubuntu-latest
    environment: snapshots 
    steps:
    - name: Checkout source
      uses: actions/checkout@v7
      with:
        fetch-depth: 0

    - name: Upload binaries to snapshots
      run: |
          echo ${{ vars.BODY }} > notes.txt
          gh release create 33456 -R alexx2000/snapshots -t "Revision 33456" --latest --notes-file notes.txt *.pp 
      env:
        GH_TOKEN: ${{ secrets.SNAPSHOTS }}
