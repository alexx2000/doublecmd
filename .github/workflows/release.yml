name: build-release

on:
  workflow_dispatch:

concurrency:
  group: ${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-lin:
    runs-on: ubuntu-latest
    environment: snapshots 
    steps:
    - name: Checkout source
      uses: actions/checkout@v7
      with:
        fetch-depth: 0

    - name: Upload binaries to snapshots
      run: |
          echo "$NOTES" > notes.txt
          #gh release create 33460 -R alexx2000/snapshots -t "Revision 33458" --latest --notes-file README.md *.pp 
      env:
        NOTES: ${{ vars.BODY }}      
        GH_TOKEN: ${{ secrets.SNAPSHOTS }}

  upload-frs:
    runs-on: ubuntu-latest
    steps:    
      - name: Download release
        run: |
             gh release download $TAG -R doublecmd/doublecmd -D doublecmd-release
             rm -f doublecmd-release/doublecmd-*-src.tar.gz
        env: 
          TAG: ${{ github.ref_name }}
      
      - name: Publish release
        run: |
             trap "rm -f ssh_key" EXIT
             echo "$SSH_PRIVATE_KEY" > ssh_key && chmod 0600 ssh_key
             echo "cd '/home/frs/project/doublecmd/Double Commander'" > upload_release.txt
             echo "lcd doublecmd-release" >> upload_release.txt
             echo "-mkdir $TAG" >> upload_release.txt
             echo "cd $TAG" >> upload_release.txt
             echo "put *" >> upload_release.txt
             echo "quit" >> upload_release.txt
             sftp -o StrictHostKeyChecking=no -i ssh_key -b upload_release.txt $REMOTE_USER@$REMOTE_HOST
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SERVER_SSH_KEY }}
          REMOTE_HOST: ${{ secrets.REMOTE_HOST }}
          REMOTE_USER: ${{ secrets.REMOTE_USER }}
          TAG: ${{ github.ref_name }}
